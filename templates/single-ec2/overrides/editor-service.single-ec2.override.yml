services:
  # Base repo service key remains `mysql`; the canonical private host is `editor-mysql`.
  mysql:
    restart: unless-stopped
    networks:
      editor-private:
        aliases:
          - editor-mysql

  editor-service:
    restart: unless-stopped
    ports:
      - "${EDITOR_SERVICE_HOST_BIND:-127.0.0.1}:${EDITOR_SERVICE_HOST_PORT:-8083}:8083"
    networks:
      editor-private: {}
      service-shared:
        aliases:
          - editor-service

networks:
  editor-private:
    driver: bridge
    internal: true
  service-shared:
    external: true
    name: ${SERVICE_SHARED_NETWORK:-service-backbone-shared}
