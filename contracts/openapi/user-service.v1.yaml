openapi: 3.0.3
info:
  title: User Service Contract
  version: 1.0.0
  description: Gateway 연동 기준 User Service 핵심 계약
servers:
  - url: http://user-service:8082
paths:
  /users/signup:
    post:
      summary: 공개 회원가입
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSignupRequest'
      responses:
        '200':
          description: OK
  /users/me:
    get:
      summary: 내 정보 조회
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized
  /internal/users/find-or-create-and-link-social:
    post:
      summary: 소셜 링크 조회/생성/연결 (표준)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserEnsureSocialRequest'
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized
  /internal/users/social:
    post:
      summary: 구 호환 소셜 링크 API (auth-server main 호환)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSocialCreateRequest'
      responses:
        '200':
          description: OK
  /internal/users/by-social:
    get:
      summary: 구 호환 소셜 조회 API (auth-server main 호환)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: socialType
          required: true
          schema:
            type: string
        - in: query
          name: providerId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UserSignupRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    UserEnsureSocialRequest:
      type: object
      required: [email, socialType, providerId]
      properties:
        email:
          type: string
          format: email
        socialType:
          type: string
          description: provider와 동의어 alias 허용
        providerId:
          type: string
          description: providerUserId와 동의어 alias 허용
        role:
          type: string
        status:
          type: string
    UserSocialCreateRequest:
      type: object
      required: [userId, socialType, providerId]
      properties:
        userId:
          type: string
          format: uuid
        socialType:
          type: string
        providerId:
          type: string
