openapi: 3.0.3
info:
  title: Auth Service Contract v2
  version: 2.0.0
  description: auth-service의 MFA, step-up, provider 확장, 세션 수명주기, 계정 정책 v2 계약 초안이다.
servers:
  - url: http://auth-service:8081
tags:
  - name: AuthV2
  - name: SSO
  - name: Session
  - name: MFA
  - name: InternalAuth
paths:
  /v2/auth/login:
    post:
      tags: [AuthV2]
      summary: v2 로그인
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                mfa_required:
                  value:
                    accessToken: null
                    refreshToken: null
                    mfaRequired: true
                fully_authenticated:
                  value:
                    accessToken: eyJhbGciOi...
                    refreshToken: eyJhbGciOi...
                    mfaRequired: false
  /v2/auth/mfa/challenge:
    post:
      tags: [MFA]
      summary: MFA 챌린지 생성
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaChallengeResponse'
              example:
                challengeId: mfa-challenge-123
                factorType: TOTP
  /v2/auth/mfa/verify:
    post:
      tags: [MFA]
      summary: MFA 검증
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaVerifyRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                accessToken: eyJhbGciOi...
                refreshToken: eyJhbGciOi...
                mfaRequired: false
  /v2/auth/sso/start/{provider}:
    get:
      tags: [SSO]
      summary: provider 기반 SSO 시작
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            example: github
      responses:
        '302':
          description: Redirect
  /v2/auth/oauth2/authorize/{provider}:
    get:
      tags: [SSO]
      summary: provider 기반 OAuth2 authorize
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            example: google
      responses:
        '302':
          description: Redirect
  /v2/auth/sessions:
    get:
      tags: [Session]
      summary: 세션 목록 조회
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
              example:
                sessions:
                  - sessionId: session-123
                    deviceId: device-abc
                    createdAt: '2026-04-01T09:30:00Z'
  /v2/auth/sessions/{sessionId}:
    delete:
      tags: [Session]
      summary: 특정 세션 종료
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No Content
  /v2/auth/logout-all:
    post:
      tags: [Session]
      summary: 전체 세션 종료
      responses:
        '204':
          description: No Content
  /v2/auth/internal/session/introspect:
    post:
      tags: [InternalAuth]
      summary: 세션/토큰 introspection
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntrospectionResponse'
              example:
                active: true
                userId: user-123
                mfaSatisfied: true
  /v2/auth/internal/accounts/{userId}/lock:
    post:
      tags: [InternalAuth]
      summary: 계정 잠금
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /v2/auth/internal/accounts/{userId}/unlock:
    post:
      tags: [InternalAuth]
      summary: 계정 잠금 해제
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
components:
  schemas:
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      example:
        username: user@example.com
        password: password1234
    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        mfaRequired:
          type: boolean
    MfaChallengeResponse:
      type: object
      properties:
        challengeId:
          type: string
        factorType:
          type: string
    MfaVerifyRequest:
      type: object
      properties:
        challengeId:
          type: string
        code:
          type: string
      example:
        challengeId: mfa-challenge-123
        code: '123456'
    SessionListResponse:
      type: object
      properties:
        sessions:
          type: array
          items:
            type: object
            properties:
              sessionId:
                type: string
              deviceId:
                type: string
              createdAt:
                type: string
    IntrospectionResponse:
      type: object
      properties:
        active:
          type: boolean
        userId:
          type: string
        mfaSatisfied:
          type: boolean
