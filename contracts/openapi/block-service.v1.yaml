openapi: 3.0.3
info:
  title: Block Service Contract
  version: 1.0.0
  description: block(documents) 서비스 핵심 계약
servers:
  - url: http://documents-service:8083
paths:
  /health:
    get:
      summary: 헬스체크
      responses:
        '200': { description: OK }
  /documents:
    get:
      summary: 문서 목록 조회
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
    post:
      summary: 문서 생성
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Created }
  /documents/trash:
    get:
      summary: 휴지통 문서 목록 조회
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
  /documents/{documentId}:
    get:
      summary: 문서 단건 조회
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: documentId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
    patch:
      summary: 문서 수정
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: documentId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
    delete:
      summary: 문서 삭제
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: documentId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
  /documents/{documentId}/blocks:
    get:
      summary: 문서 블록 목록 조회
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: documentId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
  /documents/{documentId}/visibility:
    patch:
      summary: 문서 공개 상태 수정
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: documentId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
  /documents/{documentId}/transactions:
    post:
      summary: 문서 transaction 반영
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: documentId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
  /documents/{documentId}/trash:
    patch:
      summary: 문서 휴지통 이동
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: documentId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
  /documents/{documentId}/restore:
    post:
      summary: 문서 복구
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: documentId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
  /documents/{documentId}/move:
    post:
      summary: 문서 이동
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: documentId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
  /admin/documents/{documentId}/blocks:
    post:
      summary: 관리자 블록 생성
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: documentId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
  /admin/blocks/{blockId}:
    patch:
      summary: 관리자 블록 수정
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: blockId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
    delete:
      summary: 관리자 블록 삭제
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: blockId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
  /admin/blocks/{blockId}/move:
    post:
      summary: 관리자 블록 이동
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: blockId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
