openapi: 3.0.3
info:
  title: Authz Service Contract
  version: 1.0.0
  description: authz-service의 관리자 경로 인가, RBAC 판정, 감사 추적, 운영 계약이다.
servers:
  - url: http://authz-service:8084
tags:
  - name: AdminPermission
  - name: Health
paths:
  /permissions/internal/admin/verify:
    post:
      tags: [AdminPermission]
      summary: 관리자 경로 인가 판정
      responses:
        '200':
          description: ALLOW
          headers:
            X-Request-Id:
              schema:
                type: string
            X-Correlation-Id:
              schema:
                type: string
        '403':
          description: DENY
          headers:
            X-Request-Id:
              schema:
                type: string
            X-Correlation-Id:
              schema:
                type: string
        '400':
          description: BAD_REQUEST
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionErrorResponse'
      parameters:
        - in: header
          name: X-User-Id
          required: true
          schema:
            type: string
        - in: header
          name: X-Original-Method
          required: true
          schema:
            type: string
        - in: header
          name: X-Original-Path
          required: true
          schema:
            type: string
        - in: header
          name: X-User-Role
          required: true
          schema:
            type: string
        - in: header
          name: X-Session-Id
          required: true
          schema:
            type: string
        - in: header
          name: X-Request-Id
          required: false
          schema:
            type: string
        - in: header
          name: X-Correlation-Id
          required: false
          schema:
            type: string
  /health:
    get:
      tags: [Health]
      summary: liveness 확인
      responses:
        '200':
          description: UP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: UP
  /ready:
    get:
      tags: [Health]
      summary: readiness 확인
      responses:
        '200':
          description: UP or DOWN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
              example:
                status: UP
                components:
                  db: UP
                  redis: UP
components:
  schemas:
    PermissionErrorResponse:
      type: object
      properties:
        message:
          type: string
    HealthResponse:
      type: object
      properties:
        status:
          type: string
    ReadyResponse:
      type: object
      properties:
        status:
          type: string
        components:
          type: object
          properties:
            db:
              type: string
            redis:
              type: string
