openapi: 3.0.3
info:
  title: Authz Service Contract v2
  version: 2.0.0
  description: authz-service의 권한 조회, 정책 기반 인가, 캐시, 감사, 버전 관리 v2 계약 초안이다.
servers:
  - url: http://authz-service:8084
tags:
  - name: Authorization
  - name: Policy
  - name: AdminPermission
  - name: Health
paths:
  /v2/permissions/authorize:
    post:
      tags: [Authorization]
      summary: 정책 기반 권한 검증
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorizationRequest'
      responses:
        '200':
          description: ALLOW
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationResponse'
              example:
                decision: ALLOW
                authzVersion: 12
                policyVersion: 34
        '403':
          description: DENY
  /v2/permissions/users/{userId}:
    get:
      tags: [Authorization]
      summary: 사용자 권한 조회
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionSnapshotResponse'
              example:
                userId: user-123
                roles: [ADMIN, AUDITOR]
                scopes: [admin:read, admin:write]
                tenant: tenant-a
                entitlements: [feature:reports]
  /v2/permissions/policies/{policyId}:
    get:
      tags: [Policy]
      summary: 정책 조회
      parameters:
        - in: path
          name: policyId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /v2/permissions/internal/changes/events:
    post:
      tags: [Policy]
      summary: 권한 변경 이벤트 수신
      responses:
        '202':
          description: Accepted
  /v2/permissions/internal/admin/verify:
    post:
      tags: [AdminPermission]
      summary: 관리자 경로 인가 판정 v2
      parameters:
        - in: header
          name: X-User-Id
          required: true
          schema:
            type: string
        - in: header
          name: X-User-Role
          required: true
          schema:
            type: string
        - in: header
          name: X-Session-Id
          required: true
          schema:
            type: string
        - in: header
          name: X-Original-Method
          required: true
          schema:
            type: string
        - in: header
          name: X-Original-Path
          required: true
          schema:
            type: string
        - in: header
          name: X-Authz-Version
          required: false
          schema:
            type: string
      responses:
        '200':
          description: ALLOW
        '403':
          description: DENY
        '400':
          description: BAD_REQUEST
  /v2/permissions/internal/introspect:
    post:
      tags: [Authorization]
      summary: 권한 상태 introspection
      responses:
        '200':
          description: OK
  /health:
    get:
      tags: [Health]
      summary: liveness 확인
      responses:
        '200':
          description: UP
  /ready:
    get:
      tags: [Health]
      summary: readiness 확인
      responses:
        '200':
          description: UP or DOWN
components:
  schemas:
    AuthorizationRequest:
      type: object
      properties:
        userId:
          type: string
        resource:
          type: string
        action:
          type: string
        condition:
          type: object
      example:
        userId: user-123
        resource: admin:dashboard
        action: read
        condition:
          tenant: tenant-a
    AuthorizationResponse:
      type: object
      properties:
        decision:
          type: string
          enum: [ALLOW, DENY]
        authzVersion:
          type: string
        policyVersion:
          type: string
    PermissionSnapshotResponse:
      type: object
      properties:
        userId:
          type: string
        roles:
          type: array
          items:
            type: string
        scopes:
          type: array
          items:
            type: string
        tenant:
          type: string
        entitlements:
          type: array
          items:
            type: string
