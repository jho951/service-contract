openapi: 3.0.3
info:
  title: Gateway Public Auth API
  version: 1.0.0
  description: |
    Canonical public auth contract owned by Gateway.
    Gateway maps public /v1/auth/* routes to auth-service /auth/* upstream routes.
    Auth-service does not implement or own public /v1 prefixes.
servers:
  - url: /
    description: Gateway public base URL
tags:
  - name: Auth
    description: Public auth routes exposed by Gateway
  - name: SSO
    description: Public SSO and OAuth routes exposed by Gateway
  - name: JWKS
    description: Public JWKS discovery route exposed by Gateway
paths:
  /v1/auth/login:
    post:
      tags: [Auth]
      summary: Password login
      description: Gateway forwards this request to auth-service `POST /auth/login`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded.
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh token pair
      description: Gateway forwards this request to auth-service `POST /auth/refresh`.
      responses:
        '200':
          description: Token pair refreshed.
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Gateway forwards this request to auth-service `POST /auth/logout`.
      responses:
        '204':
          description: Logout succeeded. Auth cookies may be cleared.
          headers:
            Set-Cookie:
              schema:
                type: string

  /v1/auth/sso/start:
    get:
      tags: [SSO]
      summary: Start GitHub SSO
      description: Gateway forwards this request to auth-service `GET /auth/sso/start`.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/RedirectUri'
      responses:
        '302':
          $ref: '#/components/responses/Redirect'

  /v1/auth/login/github:
    get:
      tags: [SSO]
      summary: Start GitHub SSO alias
      description: Gateway forwards this request to auth-service `GET /auth/login/github`.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/RedirectUri'
      responses:
        '302':
          $ref: '#/components/responses/Redirect'

  /v1/auth/oauth2/authorize/github:
    get:
      tags: [SSO]
      summary: Start GitHub OAuth
      description: Gateway forwards this request to auth-service `GET /auth/oauth2/authorize/github`.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/RedirectUri'
      responses:
        '302':
          $ref: '#/components/responses/Redirect'

  /v1/auth/oauth/github/callback:
    get:
      tags: [SSO]
      summary: Legacy GitHub OAuth callback redirect
      description: Gateway forwards this request to auth-service `GET /auth/oauth/github/callback`.
      responses:
        '302':
          $ref: '#/components/responses/Redirect'

  /v1/login/oauth2/code/github:
    get:
      tags: [SSO]
      summary: GitHub OAuth callback
      description: |
        GitHub App callback URL. Gateway strips `/v1` and forwards to auth-service
        `GET /login/oauth2/code/github`.
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          $ref: '#/components/responses/Redirect'

  /v1/auth/exchange:
    post:
      tags: [SSO]
      summary: Exchange SSO ticket for cookies
      description: Gateway forwards this request to auth-service `POST /auth/exchange`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SsoExchangeRequest'
      responses:
        '204':
          description: Exchange succeeded. SSO and auth cookies may be set.
          headers:
            Set-Cookie:
              schema:
                type: string

  /v1/auth/session:
    get:
      tags: [SSO]
      summary: Validate current browser session
      description: Gateway forwards this request to auth-service `GET /auth/session`.
      responses:
        '200':
          description: Session validation response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionValidation'

  /v1/auth/me:
    get:
      tags: [SSO]
      summary: Current user summary
      description: Gateway forwards this request to auth-service `GET /auth/me`.
      responses:
        '200':
          description: Current user response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'

  /v1/.well-known/jwks.json:
    get:
      tags: [JWKS]
      summary: JWKS
      description: Gateway forwards this request to auth-service `GET /.well-known/jwks.json`.
      responses:
        '200':
          description: JWKS response.
          content:
            application/json:
              schema:
                type: object

components:
  parameters:
    Page:
      name: page
      in: query
      required: false
      schema:
        type: string
        enum: [explain, editor, admin]
    RedirectUri:
      name: redirect_uri
      in: query
      required: false
      schema:
        type: string
        format: uri

  responses:
    Redirect:
      description: Redirect response.
      headers:
        Location:
          schema:
            type: string
        Set-Cookie:
          schema:
            type: string
    BadRequest:
      description: Invalid request.
    Unauthorized:
      description: Authentication failed.

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 72
    TokenResponse:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
    SsoExchangeRequest:
      type: object
      required: [ticket]
      properties:
        ticket:
          type: string
    SessionValidation:
      type: object
      required: [authenticated, userId, status, sessionId]
      properties:
        authenticated:
          type: boolean
        userId:
          type: string
        role:
          type: string
          description: Compatibility metadata only. Not used as a trusted authorization input.
        status:
          type: string
        sessionId:
          type: string
    MeResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        avatarUrl:
          type: string
        roles:
          type: array
          items:
            type: string
        status:
          type: string
